name: build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkcode:
    runs-on: ubuntu-latest
    env:
      SKIP: no-commit-to-branch
    steps:
      - uses: actions/checkout@v6
      - name: Run pre-commit
        run: |
          ./utilities/set_up_dev_env.sh
          source ./utilities/python-venv/bin/activate
          pre-commit clean
          pre-commit run --all-files --show-diff-on-failure

  build:
    runs-on: ubuntu-latest
    container:
      image: ruby:3.3
    steps:
      - uses: actions/checkout@v2
      - name: Build 4C website
        uses: ./.github/actions/build_website
        with:
          website-root-path: ''
          website-url: https://www.4c-multiphysics.org
          build-dir: ${{ github.workspace }}/website
      - name: Copy .htaccess
        run: cp $GITHUB_WORKSPACE/.htaccess $GITHUB_WORKSPACE/website/
      - name: Upload website as artifact
        uses: actions/upload-artifact@v4
        with:
          name: 4C-website
          path: |
            ${{ github.workspace }}/website/
          retention-days: 1
          include-hidden-files: true
